name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

# release-plz manages state; if two run at once they race on PRs and tags.
concurrency:
  group: release-plz
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release-plz:
    name: Release-plz
    runs-on: nott-runners
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      version: ${{ steps.parse_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install gh CLI (required by release-plz/git-config)
        run: |
          set -euo pipefail
          GH_VERSION="2.64.0"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local "gh_${GH_VERSION}_linux_amd64/bin/gh"
          gh --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      # PyPI publishing is handled by the `publish-ecosystems` job below via
      # OIDC trusted publishing (no PYPI_TOKEN needed). The earlier twine
      # step that lived here duplicated that publish and used a long-lived
      # token — removed in favour of the single OIDC path.

      - id: release-plz
        name: Run release-plz
        uses: MarcoIeni/release-plz-action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - id: parse_version
        name: Extract published version from cargo
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish-ecosystems:
    name: Publish NPM and PyPI
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI trusted publishing
      contents: write # needed by peter-evans/create-pull-request (branch + PR creation)
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update npm version
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-plz.outputs.version }}"
          echo "$VERSION" > VERSION
          cd npm
          node -e "
            const p = require('./package.json');
            p.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Package
        working-directory: ./npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      # Python dual-name publish:
      #   python/llm_as_dom/menot_you_mcp_lad/          -> "llm-as-dom" on PyPI
      #   python/llm_as_dom_mcp_pkg/menot_you_mcp_lad/  -> "llm-as-dom-mcp" on PyPI
      # Both wrap the same `menot_you_mcp_lad` module. pyproject.toml used to
      # live at python/ and was deleted; we synthesize it inline per build so
      # the repo has no stale template and both aliases stay in lockstep.
      - name: Build + publish llm-as-dom alias
        working-directory: ./python/llm_as_dom
        env:
          VERSION: ${{ needs.release-plz.outputs.version }}
        run: |
          set -euo pipefail
          cp ../../README.md README.md
          cat > pyproject.toml <<EOF
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"

          [project]
          name = "llm-as-dom"
          version = "${VERSION}"
          description = "AI browser pilot — test your app 60x cheaper. MCP server binary wrapper."
          readme = "README.md"
          license = "AGPL-3.0-or-later"
          requires-python = ">=3.9"
          keywords = ["browser", "automation", "mcp", "ai-agent", "headless", "llm"]
          classifiers = [
              "Development Status :: 4 - Beta",
              "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
              "Programming Language :: Python :: 3",
              "Topic :: Software Development :: Testing",
          ]

          [project.urls]
          Homepage = "https://github.com/menot-you/llm-as-dom"
          Repository = "https://github.com/menot-you/llm-as-dom"

          [project.scripts]
          mcp-lad = "menot_you_mcp_lad:main"

          [tool.hatch.build.targets.wheel]
          packages = ["menot_you_mcp_lad"]
          EOF
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: python/llm_as_dom/dist/

      - name: Build + publish llm-as-dom-mcp alias
        working-directory: ./python/llm_as_dom_mcp_pkg
        env:
          VERSION: ${{ needs.release-plz.outputs.version }}
        run: |
          set -euo pipefail
          cp ../../README.md README.md
          cat > pyproject.toml <<EOF
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"

          [project]
          name = "llm-as-dom-mcp"
          version = "${VERSION}"
          description = "AI browser pilot — test your app 60x cheaper. MCP server binary wrapper."
          readme = "README.md"
          license = "AGPL-3.0-or-later"
          requires-python = ">=3.9"
          keywords = ["browser", "automation", "mcp", "ai-agent", "headless", "llm"]
          classifiers = [
              "Development Status :: 4 - Beta",
              "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
              "Programming Language :: Python :: 3",
              "Topic :: Software Development :: Testing",
          ]

          [project.urls]
          Homepage = "https://github.com/menot-you/llm-as-dom"
          Repository = "https://github.com/menot-you/llm-as-dom"

          [project.scripts]
          mcp-lad = "menot_you_mcp_lad:main"

          [tool.hatch.build.targets.wheel]
          packages = ["menot_you_mcp_lad"]
          EOF
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: python/llm_as_dom_mcp_pkg/dist/

      # Open a PR to sync VERSION / npm / python version files back to main.
      # Replaces the prior `git push origin main` which is now blocked by
      # the main-protection ruleset (PR-only, required status checks).
      # peter-evans/create-pull-request creates commits via the GitHub API,
      # so they are signature-verified (good for future signed-commit gates).
      - name: Open version-sync PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): sync ecosystem versions to v${{ needs.release-plz.outputs.version }}"
          title: "chore(release): sync ecosystem versions to v${{ needs.release-plz.outputs.version }}"
          body: |
            Automated sync of `VERSION`, `npm/package.json`, and
            `python/pyproject.toml` following the Rust crate release
            at `v${{ needs.release-plz.outputs.version }}`.

            Merge this PR to land the version bumps on main. No action
            required beyond review — npm and PyPI packages are already
            published against this version.
          branch: release/sync-v${{ needs.release-plz.outputs.version }}
          base: main
          delete-branch: true
          sign-commits: true
          labels: |
            release
            automated
          add-paths: |
            VERSION
            npm/package.json
            python/pyproject.toml
