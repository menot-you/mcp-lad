name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: nott-runners
    env:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
    steps:
      - name: Preflight — require BENCHER_API_TOKEN
        id: preflight
        run: |
          if [ -z "${BENCHER_API_TOKEN}" ]; then
            echo "::notice::BENCHER_API_TOKEN not configured — skipping benchmark"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.preflight.outputs.skip != 'true'

      - name: Install build toolchain (gcc, pkg-config)
        if: steps.preflight.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        if: steps.preflight.outputs.skip != 'true'

      - uses: bencherdev/bencher@f6dd4bde2670dd4a55a6cd2ca1c7c47ecf6d5b5f # main
        if: steps.preflight.outputs.skip != 'true'

      - name: Run benchmarks with bencher
        if: steps.preflight.outputs.skip != 'true'
        run: >
          bencher run
          --project llm-as-dom
          --token "$BENCHER_API_TOKEN"
          --branch '${{ github.ref_name }}'
          --adapter rust_criterion
          --err
          cargo bench
