name: Fuzz

on:
  schedule:
    - cron: '0 4 * * 1' # Monday 4am UTC
  workflow_dispatch:

env:
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fuzz:
    name: Fuzz
    runs-on: nott-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz_parse_action
        run: cargo fuzz run fuzz_parse_action -- -max_total_time=300

      - name: Run fuzz_semantic_view
        run: cargo fuzz run fuzz_semantic_view -- -max_total_time=300

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crashes
          path: fuzz/artifacts/
