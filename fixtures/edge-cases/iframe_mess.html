<!DOCTYPE html>
<html>
<head>
  <title>Pet Shop - Embedded Chaos</title>
  <style>
    body { font-family: system-ui; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #2c3e50; }
    iframe { border: 2px solid #ddd; border-radius: 8px; margin: 10px 0; }
    .main-form { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .main-form label { display: block; margin-bottom: 4px; font-weight: bold; }
    .main-form input { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    .main-form button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pet Adoption Portal</h1>
    <p>Complete the form below. The map and reviews are embedded from external sources.</p>

    <!-- Main form (this is what the pilot should fill) -->
    <div class="main-form">
      <h2>Adoption Application</h2>
      <form id="adoptionForm">
        <label for="applicantName">Your Name</label>
        <input type="text" id="applicantName" name="name" placeholder="Jane Doe" required>
        <label for="applicantEmail">Email</label>
        <input type="email" id="applicantEmail" name="email" placeholder="jane@example.com" required>
        <label for="petPreference">Preferred Pet Type</label>
        <input type="text" id="petPreference" name="pet_type" placeholder="Dog, Cat, Bird...">
        <button type="submit">Submit Application</button>
      </form>
    </div>

    <!-- Chaos: iframe with its own form (should NOT be filled by pilot) -->
    <h3>Location (embedded map — ignore this)</h3>
    <iframe srcdoc='
      <html><body style="font-family:sans-serif;padding:10px">
        <p>Fake Map Widget v2.0</p>
        <form><input type="text" placeholder="Search location..." style="width:200px;padding:4px"><button>Go</button></form>
        <div style="background:#eee;height:200px;display:flex;align-items:center;justify-content:center;color:#888">
          [Map would be here]
        </div>
      </body></html>
    ' width="100%" height="280"></iframe>

    <!-- Another iframe: fake review widget -->
    <h3>Customer Reviews (embedded — ignore this too)</h3>
    <iframe srcdoc='
      <html><body style="font-family:sans-serif;padding:10px">
        <div style="border-bottom:1px solid #eee;padding:8px 0"><b>★★★★★</b> Great shop! - Alice</div>
        <div style="border-bottom:1px solid #eee;padding:8px 0"><b>★★★☆☆</b> Slow delivery - Bob</div>
        <form style="margin-top:10px">
          <input type="text" placeholder="Write a review..." style="width:200px;padding:4px">
          <button>Post</button>
        </form>
      </body></html>
    ' width="100%" height="200"></iframe>
  </div>

  <script>
    document.getElementById('adoptionForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      document.title = 'Application Submitted - ' + data.name;
      e.target.innerHTML = '<h3 style="color:#27ae60">Application submitted! We will contact you at ' + data.email + '</h3>';
    });
  </script>
</body>
</html>
