<!DOCTYPE html><html><head><script>document.getElementById('vol').addEventListener('input',(e)=>document.getElementById('volval').textContent=e.target.value)</script></head><body><label>Volume: <input type='range' id='vol' min='0' max='100' value='50'></label><output id='volval'>50</output><p>Range input controls output, but they're separate elements.</p></body></html>
