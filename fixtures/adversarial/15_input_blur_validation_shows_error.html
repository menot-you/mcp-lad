<!DOCTYPE html><html><head><style>.error{display:none;color:red}.input.invalid~.error{display:block}</style></head><body><input id='email' class='input' type='text' placeholder='Email'><div class='error'>Invalid email format</div><script>document.getElementById('email').addEventListener('blur',()=>{if(!document.getElementById('email').value.includes('@')){document.getElementById('email').classList.add('invalid')}})</script></body></html>
