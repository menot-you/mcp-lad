<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Shop - Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 2rem; width: 380px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: .875rem; color: #555; margin-bottom: .25rem; }
    input { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    input:focus { outline: 2px solid #4a90d9; border-color: transparent; }
    button { width: 100%; padding: .7rem; background: #4a90d9; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: .5rem; }
    button:hover { background: #357abd; }
    .links { margin-top: 1rem; text-align: center; font-size: .875rem; }
    .links a { color: #4a90d9; text-decoration: none; }
    .error { display: none; color: #d32f2f; font-size: .875rem; padding: .5rem; background: #fde; border-radius: 4px; margin-bottom: 1rem; }
    .success { display: none; color: #2e7d32; font-size: .875rem; padding: .5rem; background: #e8f5e9; border-radius: 4px; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pet Shop Login</h1>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <form id="loginForm" action="/api/login" method="POST">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit">Sign In</button>
    </form>
    <div class="links">
      <a href="/forgot">Forgot password?</a> &middot; <a href="/register">Create account</a>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (email === 'test@petshop.com' && password === 'pet123') {
        successEl.textContent = 'Login successful! Redirecting...';
        successEl.style.display = 'block';
        setTimeout(() => { window.location.hash = '#dashboard'; document.title = 'Pet Shop - Dashboard'; }, 500);
      } else {
        errorEl.textContent = 'Invalid email or password. Please try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
