<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Shop - Order Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #f5f5f5; padding: 2rem; }
    h1 { text-align: center; margin-bottom: 2rem; }
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; justify-content: center; align-items: center; z-index: 100; }
    .modal { background: white; border-radius: 12px; padding: 2rem; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.2); }
    .modal h2 { color: #c0392b; margin-bottom: 1rem; }
    .modal p { color: #555; margin-bottom: 1.5rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 1rem; }
    .modal-actions button { flex: 1; padding: .6rem; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .btn-retry { background: #e67e22; color: white; }
    .btn-cancel { background: #ecf0f1; color: #333; }
    .hidden { display: none; }
    .success-msg { text-align: center; color: #27ae60; font-size: 1.25rem; padding: 3rem; }
  </style>
</head>
<body>
  <h1>Pet Shop</h1>
  <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-label="Error dialog">
    <div class="modal">
      <h2>Order Failed</h2>
      <p>We couldn't process your order for "Premium Dog Food". The payment gateway returned an error. Would you like to try again?</p>
      <div class="modal-actions">
        <button id="retryBtn" class="btn-retry">Try Again</button>
        <button id="cancelBtn" class="btn-cancel">Cancel Order</button>
      </div>
    </div>
  </div>
  <div id="successMsg" class="success-msg hidden">Order placed successfully!</div>
  <script>
    document.getElementById('retryBtn').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('successMsg').classList.remove('hidden');
      document.title = 'Pet Shop - Order Confirmed';
    });
    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      document.title = 'Pet Shop - Order Cancelled';
    });
  </script>
</body>
</html>
