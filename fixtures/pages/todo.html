<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Shop - Task List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem; }
    .app { width: 500px; }
    h1 { font-size: 2rem; text-align: center; color: #e67e22; margin-bottom: 1rem; }
    .input-row { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .input-row input { flex: 1; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    .input-row button { padding: .6rem 1.2rem; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .todo-list { list-style: none; }
    .todo-item { background: white; border-radius: 8px; padding: .8rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; gap: .8rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .todo-item.done label { text-decoration: line-through; color: #aaa; }
    .todo-item label { flex: 1; cursor: pointer; }
    .todo-item button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1.2rem; }
    .filters { display: flex; gap: .5rem; justify-content: center; margin-top: 1rem; }
    .filters button { padding: .3rem .8rem; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: .875rem; }
    .filters button.active { background: #e67e22; color: white; border-color: #e67e22; }
    .count { text-align: center; color: #888; font-size: .875rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Pet Tasks</h1>
    <div class="input-row">
      <input type="text" id="newTodo" placeholder="What needs to be done?" aria-label="New task">
      <button id="addBtn" type="button">Add</button>
    </div>
    <ul id="todoList" class="todo-list"></ul>
    <div class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>
    <div id="count" class="count">0 items</div>
  </div>
  <script>
    let todos = [];
    let filter = 'all';

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => filter === 'all' || (filter === 'done' ? t.done : !t.done));
      list.innerHTML = filtered.map((t, i) => 
        '<li class="todo-item ' + (t.done ? 'done' : '') + '">' +
        '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' data-idx="' + todos.indexOf(t) + '">' +
        '<label>' + t.text + '</label>' +
        '<button data-del="' + todos.indexOf(t) + '">x</button></li>'
      ).join('');
      document.getElementById('count').textContent = todos.filter(t => !t.done).length + ' items left';
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (text) { todos.push({ text, done: false }); input.value = ''; render(); }
    });

    document.getElementById('newTodo').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    document.getElementById('todoList').addEventListener('change', (e) => {
      if (e.target.type === 'checkbox') {
        todos[+e.target.dataset.idx].done = e.target.checked;
        render();
      }
    });

    document.getElementById('todoList').addEventListener('click', (e) => {
      if (e.target.dataset.del !== undefined) {
        todos.splice(+e.target.dataset.del, 1);
        render();
      }
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filters .active').classList.remove('active');
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
